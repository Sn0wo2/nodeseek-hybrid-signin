name: NodeSeek Sign

on:
  schedule:
    # 00:00 Asia/Shanghai (16:00 UTC)
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      enable_statistics:
        description: 'Enable 30-day statistics'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      random_mode:
        description: 'Signin mode (false=chicken legs x5, true=random)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  TZ: Asia/Shanghai

jobs:
  signin:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: latest
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Install dependencies
      run: poetry install --no-interaction

    - name: Set env
      run: |
        echo "GITHUB_ACTIONS=true" >> $GITHUB_ENV
        echo "ENABLE_STATISTICS=${{ github.event.inputs.enable_statistics || 'true' }}" >> $GITHUB_ENV
        echo "NS_RANDOM=${{ github.event.inputs.random_mode || 'true' }}" >> $GITHUB_ENV
        echo "TIMEOUT=60" >> $GITHUB_ENV

    - name: Run signin
      env:
        NS_COOKIE: ${{ vars.NS_COOKIE }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        PROXY_URL: ${{ vars.PROXY_URL }}
      run: poetry run python nodeseek_api_signin.py

    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: nodeseek-logs-${{ github.run_number }}
        path: |
          *.log
        retention-days: 7
